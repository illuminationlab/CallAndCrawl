<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="500" height="150">
  <rect width="500" height="150" fill="#ffffff"/>

  <!-- Magnifying glass: center at 68,72 -->
  <circle cx="68" cy="72" r="38" fill="none" stroke="#2d6a2d" stroke-width="3"/>
  <circle cx="68" cy="72" r="30" fill="#edf6ed" stroke="#2d6a2d" stroke-width="0.8" opacity="0.6"/>

  <!-- ANT: grouped and centered using transform. Body midpoint at glass center 68,72 -->
  <g transform="translate(0,7)">
    <!-- Head -->
    <circle cx="68" cy="50" r="6" fill="#2d6a2d"/>
    <!-- Thorax -->
    <circle cx="68" cy="63" r="5" fill="#2d6a2d"/>
    <!-- Abdomen -->
    <circle cx="68" cy="78" r="8" fill="#2d6a2d"/>

    <!-- Antennae with bulb tips -->
    <line x1="65" y1="45" x2="56" y2="34" stroke="#2d6a2d" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="56" cy="34" r="2" fill="#2d6a2d"/>
    <line x1="71" y1="45" x2="80" y2="34" stroke="#2d6a2d" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="80" cy="34" r="2" fill="#2d6a2d"/>

    <!-- Legs left (from thorax) -->
    <line x1="63" y1="60" x2="50" y2="53" stroke="#2d6a2d" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="63" y1="64" x2="49" y2="64" stroke="#2d6a2d" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="63" y1="68" x2="50" y2="75" stroke="#2d6a2d" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Legs right (from thorax) -->
    <line x1="73" y1="60" x2="86" y2="53" stroke="#2d6a2d" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="73" y1="64" x2="87" y2="64" stroke="#2d6a2d" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="73" y1="68" x2="86" y2="75" stroke="#2d6a2d" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Handle — brown, angled bottom right -->
  <line x1="98" y1="102" x2="118" y2="122" stroke="#6b3a1f" stroke-width="6" stroke-linecap="round"/>
  <line x1="98" y1="102" x2="118" y2="122" stroke="#a0522d" stroke-width="2.5" stroke-linecap="round"/>

  <!-- CALL & wordmark -->
  <text x="140" y="62" font-family="'Big Shoulders Display', 'Arial Black', sans-serif"
        font-size="44" font-weight="900" fill="#2d6a2d" letter-spacing="-1">CALL &amp;</text>
  <!-- Divider rule brown -->
  <line x1="140" y1="70" x2="492" y2="70" stroke="#6b3a1f" stroke-width="1.5"/>
  <!-- CRAWL wordmark -->
  <text x="140" y="106" font-family="'Big Shoulders Display', 'Arial Black', sans-serif"
        font-size="44" font-weight="900" fill="#6b3a1f" letter-spacing="-1">CRAWL</text>
  <!-- Tagline -->
  <text x="140" y="126" font-family="monospace" font-size="8" fill="#aaaaaa"
        letter-spacing="2">INFEST YOUR MARKET. DOMINATE YOUR TERRITORY.</text>
</svg>
